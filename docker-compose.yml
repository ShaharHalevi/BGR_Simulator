###############################################################################
# BGR_Simulator – Docker Compose
#
# Usage:
#   make docker                                (Recommended - runs interactive session)
#   docker compose run simulator               (Direct docker command)
#
# Run this on host if encountering GUI/display problems:
#   xhost +local:docker
###############################################################################

services:
  simulator:
    build: .
    image: bgr_simulator
    container_name: bgr_simulator
    working_dir: /ros2_ws/src/bgr_simulator
    stdin_open: true # -i
    tty: true # -t
    network_mode: host
    ipc: host # Fixes ROS 2 topic payload visibility outside docker
    devices:
      - /dev/dri:/dev/dri # Enables the integrated graphics of the cpu to be used (in case a dedicated gpu is not available)
    environment:
      - GZ_PARTITION=bgr_sim
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4 # Force UDP, disable SHM transport (fixes host visibility)
    volumes:
      - ./src:/ros2_ws/src/bgr_simulator/src:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Uncomment the following block to enable NVIDIA GPU acceleration
    # (requires nvidia-container-toolkit to be installed on the host)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    command: ./main-launch.sh
